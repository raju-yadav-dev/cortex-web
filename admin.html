<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Manage Cortex users and admin tools." />
    <meta name="theme-color" content="#05080f" />
    <title>Admin Dashboard | Cortex</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icon/Cortex 32x32.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="assets/icon/Cortex 256x256.png" />
    <link rel="manifest" href="assets/icon/manifest.json" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="page-admin" data-page="admin">
    <div class="ambient-layer" aria-hidden="true">
      <span class="orb orb-one"></span>
      <span class="orb orb-two"></span>
      <span class="orb orb-three"></span>
    </div>

    <div class="admin-shell">
      <aside class="glass admin-sidebar">
        <a class="brand" href="index.html">
          <span class="brand-mark">
            <img src="assets/icon/Cortex 64x64.png" alt="Cortex icon" />
          </span>
          <span class="brand-text">Cortex Admin</span>
        </a>
        <nav class="admin-nav">
          <a href="admin.html" class="is-active">Dashboard</a>
          <a href="profile.html">My Profile</a>
          <a href="index.html#downloads">Installers</a>
          <a href="index.html#web-future">Web Future</a>
        </nav>
        <p class="admin-note">New Supabase signup users will appear live in this dashboard table.</p>
      </aside>

      <main class="admin-main">
        <header class="glass admin-topbar">
          <div>
            <p class="kicker">Administrator Panel</p>
            <h1>User Management</h1>
          </div>
          <div class="auth-slot" data-auth-slot></div>
        </header>

        <section class="admin-stats">
          <article class="glass stat-card">
            <h3>Total Users</h3>
            <p id="statTotalUsers">0</p>
          </article>
          <article class="glass stat-card">
            <h3>Admins</h3>
            <p id="statAdminUsers">0</p>
          </article>
          <article class="glass stat-card">
            <h3>Standard Users</h3>
            <p id="statNormalUsers">0</p>
          </article>
        </section>

        <section class="glass admin-table-wrap">
          <div class="table-head">
            <h2>Registered Users</h2>
            <input id="userSearch" type="search" placeholder="Search by name, username, email..." />
          </div>
          <div class="table-scroll">
            <table class="users-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Username</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Created</th>
                  <th>Last Login</th>
                </tr>
              </thead>
              <tbody id="userTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="assets/js/common.js"></script>
    <script src="assets/js/admin.js"></script>
  </body>
</html>
