<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reset your Altarix password securely." />
    <meta name="theme-color" content="#05080f" />
    <title>Forgot Password | Altarix</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icon/Altarix 32x32.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="assets/icon/Altarix 256x256.png" />
    <link rel="manifest" href="assets/icon/manifest.json" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="page-auth" data-page="forgot-password">
    <div class="ambient-layer" aria-hidden="true">
      <span class="orb orb-one"></span>
      <span class="orb orb-two"></span>
      <span class="orb orb-three"></span>
    </div>

    <header class="site-header glass">
      <a class="brand" href="index.html">
        <span class="brand-mark">
          <img src="assets/icon/Altarix-64.png" alt="Altarix icon" />
        </span>
        <span class="brand-text">Altarix</span>
      </a>
      <button class="menu-toggle" data-menu-toggle aria-label="Toggle navigation">Menu</button>
      <nav class="site-nav" data-nav-menu>
        <a href="index.html#about">About</a>
        <a href="downloads.html">Downloads</a>
      </nav>
      <div class="auth-slot" data-auth-slot></div>
    </header>

    <main class="auth-layout">
      <section class="auth-intro reveal">
        <p class="kicker">Account Recovery</p>
        <h1>Reset your Altarix password</h1>
        <p>Enter your account email and set a new password.</p>
      </section>

      <section class="auth-card glass reveal">
        <h2>Forgot Password</h2>
        <form id="forgotForm" class="form-stack">
          <label>
            Email
            <input type="email" name="email" placeholder="you@example.com" required />
          </label>
          <label>
            New Password
            <div class="password-input-row">
              <input id="forgotNewPassword" type="password" name="newPassword" placeholder="Minimum 8 characters" required />
              <button class="password-visibility-btn" type="button" data-password-toggle data-target="forgotNewPassword" aria-label="Show password" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M1.5 12s3.5-6 10.5-6 10.5 6 10.5 6-3.5 6-10.5 6S1.5 12 1.5 12Z" />
                  <circle cx="12" cy="12" r="3.5" />
                  <path class="eye-off" d="M4 20 20 4" />
                </svg>
              </button>
            </div>
          </label>
          <label>
            Confirm New Password
            <div class="password-input-row">
              <input id="forgotConfirmPassword" type="password" name="confirmPassword" placeholder="Confirm new password" required />
              <button class="password-visibility-btn" type="button" data-password-toggle data-target="forgotConfirmPassword" aria-label="Show password" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M1.5 12s3.5-6 10.5-6 10.5 6 10.5 6-3.5 6-10.5 6S1.5 12 1.5 12Z" />
                  <circle cx="12" cy="12" r="3.5" />
                  <path class="eye-off" d="M4 20 20 4" />
                </svg>
              </button>
            </div>
          </label>
          <button class="btn btn-primary" type="submit">Update Password</button>
        </form>
        <div class="form-foot">
          <a href="login.html">Back to login</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Copyright <span data-year></span> Altarix.</p>
    </footer>

    <script src="assets/js/common.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
